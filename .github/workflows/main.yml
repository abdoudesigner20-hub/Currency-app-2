name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm install

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Create www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp icon.png   www/icon.png
          cp icon2.png  www/icon2.png
          cp manifest.json www/manifest.json

      - name: Init Capacitor
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Replace app icons (fix adaptive icon override)
        run: |
          # حذف ملفات XML الافتراضية التي تتجاهل الأيقونات المخصصة
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f  android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f  android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml

          # إنشاء مجلدات الأيقونات
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # توليد الأيقونات من icon2.png (512×512)
          convert icon2.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon2.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert icon2.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon2.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert icon2.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon2.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert icon2.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon2.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert icon2.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert icon2.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: currency-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
